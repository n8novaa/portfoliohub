{% extends "base.html" %}

{% block title %}Projects | Portfolio{% endblock %}

{% block content %}

    <h1>Projects</h1>

    {% if projects %}
        <div class="projects-grid">
            {% for project in projects %}
                <div class="project-card">
                    <h2>
                        <a href="{% url 'project_detail' project.slug %}">
                            {{ project.title }}
                        </a>
                    </h2>
                    <p>{{ project.short_description }}</p>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No projects added yet.</p>
    {% endif %}
    
{% endblock %}
