<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project.title }}</title>
</head>
<body>
    
    <a href="{% url 'project_list' %}">Back to Projects</a>

    <h1>{{ project.title }}</h1>
    <p><strong>{{ project.short_description }}</strong></p>

    <h3>Overview</h3>
    <p>{{ project.description }}</p>

    <h3>Tech Stack</h3>
    <p>{{ project.tech_stack }}</p>

    <h3>Links</h3>
    <ul>
        <li><a href="{{ project.github_url }}">Github</a></li>
        {% if project.live_url %}
            <li><a href="{{ project.live_url }}">Live</a></li>
        {% endif %}
    </ul>
</body>
</html>
