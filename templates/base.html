<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Professional portfolio showcasing web development projects, skills, and experience.{% endblock %}">
    <meta name="author" content="{% block meta_author %}Portfolio{% endblock %}">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Portfolio{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Professional portfolio showcasing web development projects, skills, and experience.{% endblock %}">
    
    <title>{% block title %}Portfolio{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

    <!-- NAVBAR -->
    <header class="header">
        <div class="container navbar">
            <a href="{% url 'home' %}" class="nav-brand">Portfolio</a>

            <button class="nav-toggle" aria-label="Toggle navigation">
                <span class="hamburger"></span>
            </button>

            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="{% url 'home' %}" class="nav-link">Home</a></li>
                    <li><a href="{% url 'about' %}" class="nav-link">About</a></li>
                    <li><a href="{% url 'skills' %}" class="nav-link">Skills</a></li>
                    <li><a href="{% url 'project_list' %}" class="nav-link">Projects</a></li>
                    <li><a href="{% url 'experience' %}" class="nav-link">Experience</a></li>
                    <li><a href="{% url 'education' %}" class="nav-link">Education</a></li>
                    <li><a href="{% url 'connect' %}" class="btn btn-primary nav-cta">Connect</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
